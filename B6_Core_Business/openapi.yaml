openapi: 3.1.0
info:  title: Smart Campus — Core Business API Contract (B6)
  version: 1.0.0
  description: |
     Hợp đồng API chính thức của Core Business Service (B6) được ánh xạ chuẩn xác từ mã nguồn đang hoạt động.
    Tài liệu này bao gồm cả các Endpoint Inbound (do B6 cung cấp) và Outbound (B6 gọi sang các nhóm vệ tinh).
  contact:
    name: FIT4110 Core Business Team B6
    email: b6-core@example.edu.vn
servers:
  - url: http://localhost:8000
    description: B6 Core Business Local Server
tags:
  - name: Health & UI
    description: System health check and UI streaming
  - name: B3 (Access Gate)
    description: Giao tiếp 2 chiều với cửa kiểm soát
  - name: B4 (AI Vision)
    description: Nhận cảnh báo và yêu cầu đối sánh
  - name: B2 (Camera Stream)
    description: Nhận sự kiện camera trực tiếp
  - name: B7 (Notification)
    description: Kích hoạt báo động khẩn cấp
  - name: B5 (Analytics)
    description: Đồng bộ kho dữ liệu tập trung

paths:
  /health:
    get:
      summary: Kiểm tra trạng thái service B6
      tags: [Health & UI]
      responses:
        '200':
          description: Hoạt động bình thường

  /api/v1/events/access:
    post:
      summary: Nhận sự kiện quẹt thẻ (B3 gọi B6)
      description: Endpoint nhận request từ B3 để kiểm tra tính hợp lệ của thẻ (Anti-passback, Whitelist, Time restriction). Hỗ trợ cả Event đơn lẻ và Bulk Sync.
      tags: [B3 (Access Gate)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gateId: { type: string, example: "GATE_01" }
                uid: { type: string, example: "04:A1:B2:C3" }
                timestamp: { type: string, format: date-time }
      responses:
        '200':
          description: Thẻ hợp lệ
        '429':
          description: Thẻ quẹt quá nhanh (Anti-passback)
        '403':
          description: Sai thẻ hoặc ngoài giờ

  /api/v1/webhook/vision:
    post:
      summary: Nhận cảnh báo AI (B4 gọi B6)
      description: Webhook nhận kết quả phân tích hình ảnh từ B4 (DetectionResult).
      tags: [B4 (AI Vision)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectionId: { type: string }
                cameraId: { type: string }
                detectionType: { type: string }
                riskLevel: { type: string, example: "CRITICAL" }
                timestamp: { type: string, format: date-time }
      responses:
        '200':
          description: Đã ghi nhận

  /camera-events:
    post:
      summary: Nhận event từ Camera (B2 gọi B6)
      description: Nhận dữ liệu CameraEvent trực tiếp từ B2 IoT Gateway.
      tags: [B2 (Camera Stream)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceService: { type: string }
                eventType: { type: string }
                cameraId: { type: string }
                abnormal: { type: boolean }
                severity: { type: string }
      responses:
        '200':
          description: Đã xử lý

  /gate/command:
    post:
      summary: Lệnh điều khiển cổng (B6 gọi B3)
      tags: [B3 (Access Gate)]
      servers:
        - url: http://26.222.63.164:8003
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command: { type: string, example: "OPEN" }
                uid: { type: string, example: "ALL_GATES_EMERGENCY" }
      responses:
        '200':
          description: Thành công

  /vision/face-match:
    post:
      summary: Yêu cầu đối sánh khuôn mặt (B6 gọi B4)
      tags: [B4 (AI Vision)]
      servers:
        - url: http://26.79.18.68:4010
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cameraId: { type: string }
                imageRef: { type: string }
                timestamp: { type: string }
      responses:
        '200':
          description: Trả về kết quả đối sánh

  /notify/send:
    post:
      summary: Phát lệnh báo động (B6 gọi B7)
      tags: [B7 (Notification)]
      servers:
        - url: http://26.177.175.21:8007
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, example: "CẢNH BÁO: AI_VISION_ALERT" }
                level: { type: string, example: "CRITICAL" }
                message: { type: string }
      responses:
        '202':
          description: Đã nhận lệnh báo động

  /analytics/export:
    post:
      summary: Xuất dữ liệu Log (B6 gọi B5)
      tags: [B5 (Analytics)]
      servers:
        - url: http://26.70.59.176:9000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from: { type: string }
                to: { type: string }
                data: { type: array, items: { type: object } }
      responses:
        '200':
          description: Đồng bộ thành công
ontent:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/rate-limit
            title: Quá giới hạn tần suất yêu cầu
            status: 429
            detail: Hệ thống AI đang xử lý tối đa tải. Vui lòng thử lại sau.
            instance: /vision/face-match
            errors: []

    InternalServerError:
      description: Lỗi hệ thống bất ngờ của server AI
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/internal
            title: Lỗi hệ thống phía máy chủ
            status: 500
            detail: Lỗi xảy ra trong quá trình khởi tạo luồng xử lý nhận diện GPU
            instance: /vision/detect
            errors: []
