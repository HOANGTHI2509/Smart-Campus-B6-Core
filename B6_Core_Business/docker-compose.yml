services:
  api:
    build: .
    container_name: b6-core-api
    ports:
      # Expose port 8000 của container ra port 8000 của máy host (laptop)
      # Đây là điều kiện bắt buộc để nhóm khác gọi được vào B6
      - "8000:8000"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - b6-network
    restart: unless-stopped

networks:
  b6-network:
    driver: bridge
